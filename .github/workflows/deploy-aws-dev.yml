name: Deploy AWS Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "services/certificate/**"
      - "web/apps/staff/**"
      - "web/apps/inspector/**"
      - "infra/terraform/**"
      - ".github/workflows/deploy-aws-dev.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-2
  ECR_API_REPOSITORY: hms-dev-api
  ECR_CERTIFICATE_ENGINE_REPOSITORY: hms-dev-certificate-engine
  ECS_CLUSTER: ${{ vars.AWS_DEV_ECS_CLUSTER || 'hms-dev' }}
  ECS_API_SERVICE: ${{ vars.AWS_DEV_API_SERVICE || 'hms-dev-api' }}
  ECS_WORKER_SERVICE: ${{ vars.AWS_DEV_WORKER_SERVICE || 'hms-dev-worker' }}
  ECS_BEAT_SERVICE: ${{ vars.AWS_DEV_BEAT_SERVICE || 'hms-dev-beat' }}
  ECS_CERTIFICATE_ENGINE_SERVICE: ${{ vars.AWS_DEV_CERTIFICATE_ENGINE_SERVICE || 'hms-dev-certificate-engine' }}
  ECS_MIGRATE_TASK_DEFINITION: ${{ vars.AWS_DEV_MIGRATE_TASK_DEFINITION || 'hms-dev-migrate' }}

jobs:
  deploy:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    environment: aws-dev

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEV_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            --tag "$REGISTRY/$ECR_API_REPOSITORY:latest" \
            --tag "$REGISTRY/$ECR_API_REPOSITORY:${GITHUB_SHA}" \
            backend
          docker push "$REGISTRY/$ECR_API_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_API_REPOSITORY:${GITHUB_SHA}"

      - name: Build and push certificate engine image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            --tag "$REGISTRY/$ECR_CERTIFICATE_ENGINE_REPOSITORY:latest" \
            --tag "$REGISTRY/$ECR_CERTIFICATE_ENGINE_REPOSITORY:${GITHUB_SHA}" \
            services/certificate
          docker push "$REGISTRY/$ECR_CERTIFICATE_ENGINE_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_CERTIFICATE_ENGINE_REPOSITORY:${GITHUB_SHA}"

      - uses: hashicorp/setup-terraform@v3

      - name: Validate AWS dev infrastructure
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Build ECS network configuration
        env:
          AWS_DEV_ECS_SUBNET_IDS: ${{ vars.AWS_DEV_ECS_SUBNET_IDS }}
          AWS_DEV_ECS_SECURITY_GROUP_ID: ${{ vars.AWS_DEV_ECS_SECURITY_GROUP_ID }}
        run: |
          python3 - <<'PY' > ecs-network.json
          import json
          import os

          subnets = [
              subnet.strip()
              for subnet in os.environ["AWS_DEV_ECS_SUBNET_IDS"].split(",")
              if subnet.strip()
          ]
          security_group = os.environ["AWS_DEV_ECS_SECURITY_GROUP_ID"].strip()
          if len(subnets) < 2:
              raise SystemExit("AWS_DEV_ECS_SUBNET_IDS must contain at least two subnet ids")
          if not security_group:
              raise SystemExit("AWS_DEV_ECS_SECURITY_GROUP_ID is required")

          print(json.dumps({
              "awsvpcConfiguration": {
                  "subnets": subnets,
                  "securityGroups": [security_group],
                  "assignPublicIp": "ENABLED",
              }
          }))
          PY

      - name: Validate deployed browser auth configuration
        run: |
          task_arn="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "$ECS_MIGRATE_TASK_DEFINITION" \
              --network-configuration file://ecs-network.json \
              --overrides '{"containerOverrides":[{"name":"migrate","command":["python","-c","from hms_backend.app.core.config import settings; settings.validate_browser_auth()"]}]}' \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          if [ -z "$task_arn" ] || [ "$task_arn" = "None" ]; then
            echo "Failed to start browser-auth validation task" >&2
            exit 1
          fi
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$task_arn"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$task_arn" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text
          )"
          if [ "$exit_code" != "0" ]; then
            aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$task_arn"
            exit "$exit_code"
          fi

      - name: Run database migrations and dev seed
        run: |
          task_arn="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "$ECS_MIGRATE_TASK_DEFINITION" \
              --network-configuration file://ecs-network.json \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          if [ -z "$task_arn" ] || [ "$task_arn" = "None" ]; then
            echo "Failed to start migration task" >&2
            exit 1
          fi
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$task_arn"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$task_arn" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text
          )"
          if [ "$exit_code" != "0" ]; then
            aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$task_arn"
            exit "$exit_code"
          fi

      - name: Force ECS service deployments
        run: |
          for service in \
            "$ECS_CERTIFICATE_ENGINE_SERVICE" \
            "$ECS_API_SERVICE" \
            "$ECS_WORKER_SERVICE" \
            "$ECS_BEAT_SERVICE"; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service" \
              --force-new-deployment >/dev/null
          done
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services \
              "$ECS_CERTIFICATE_ENGINE_SERVICE" \
              "$ECS_API_SERVICE" \
              "$ECS_WORKER_SERVICE" \
              "$ECS_BEAT_SERVICE"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/apps/staff/package-lock.json
            web/apps/inspector/package-lock.json

      - name: Build staff app
        working-directory: web/apps/staff
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Build inspector app
        working-directory: web/apps/inspector
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Upload staff app to S3
        env:
          STAFF_BUCKET: ${{ vars.AWS_DEV_STAFF_BUCKET }}
        run: |
          aws s3 sync web/apps/staff/dist "s3://$STAFF_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp web/apps/staff/dist/index.html "s3://$STAFF_BUCKET/index.html" \
            --cache-control "no-cache"

      - name: Upload inspector app to S3
        env:
          INSPECTOR_BUCKET: ${{ vars.AWS_DEV_INSPECTOR_BUCKET }}
        run: |
          aws s3 sync web/apps/inspector/dist "s3://$INSPECTOR_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp web/apps/inspector/dist/index.html "s3://$INSPECTOR_BUCKET/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_DEV_STAFF_DISTRIBUTION_ID }}" \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_DEV_INSPECTOR_DISTRIBUTION_ID }}" \
            --paths "/*"
