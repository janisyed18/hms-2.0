name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --dev
      - run: uv run ruff check . ../tooling
      - run: uv run mypy src tests ../tooling
      - run: uv run pytest

  certificate-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/certificate
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run pytest

  staff-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/apps/staff
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/apps/staff/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  inspector-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/apps/inspector
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/apps/inspector/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker compose --profile frontend build

  staff-auth-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/apps/staff/package-lock.json
      - run: npm ci
        working-directory: web/apps/staff
      - run: npx playwright install --with-deps chromium
        working-directory: web/apps/staff
      - run: docker compose --profile frontend up -d --build
      - run: curl --fail --retry 30 --retry-delay 2 http://127.0.0.1:8000/health/ready
      - run: npm run test:e2e
        working-directory: web/apps/staff
      - if: failure()
        run: docker compose logs --no-color api migrate staff
      - if: always()
        run: docker compose --profile frontend down -v
