name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run pytest

  staff-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/apps/staff
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/apps/staff/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  inspector-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/apps/inspector
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/apps/inspector/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build
